;&lt;a href=&quot;http://hiddenhall.com&quot;&gt;hiddenhall.com&lt;/a&gt;&lt;/p&gt;&lt;p&gt;13 years later, we\\'re still upside down! Since February 2012, Shafty - Portland\\'s Tribute to Phish has brought masterful improv to the stage using the decades-deep Phish catalog as a trampoline for creative expression. Their faithful recreation of Phish\\'s light-hearted progressive rock has enamored fans across the country, despite staying close to home for live performances in cities of the Pacific Northwest. Shafty\\'s audience knows to expect the band riding waves of steamy dance jams, while dropping surprising twists and turns in every set. The band has been found threading Neil Young, Spice Girls, and Lil Jon songs (this is a small taste) among a maze of Phish originals!&lt;/p&gt;&lt;p&gt;With a catalog of Phish\\'s original music spanning 1983 to 2025, and sneaking in anything from the rest of the music world as fair game, Shafty leaves audiences freely guessing at the songlist and questioning their sanity, while they boogie on long after the moment ends!&lt;/p&gt;","image":"https://static.tixr.com/static/images/external/img/1693b30b-47f1-423b-9ff4-c34fcfb3c85a.png","url":"https://www.tixr.com/groups/hiddenhall/events/shafty-portland-s-tribute-to-phish-2-sets--184501","startDate":"2026-07-25T03:00:00+00:00","endDate":"2026-07-25T09:00:00+00:00","location":{"@type":"Place","name":"Hidden Hall","address":{"@type":"PostalAddress","streetAddress":"","addressLocality":"Seattle","addressRegion":"WA","addressCountry":"US"}},"offers":{"@type":"Offer","url":"https://www.tixr.com/groups/hiddenhall/events/shafty-portland-s-tribute-to-phish-2-sets--184501","category":"primary","availability":"InStock","priceCurrency":"USD","price":15,"validFrom":"2026-04-04T19:00:00+00:00","validThrough":"2026-07-24T07:00:00+00:00"},"performer":"Organization"},{"@context":"http://schema.org","@type":"Event","name":"&quot;TiK ToK 2010s Recession Pop: Party Rock Heatwave&quot; feat DJ Dance Danc Lounge&lt;br /&gt;412 N 36th St&lt;br /&gt;&lt;a href=&quot;http://www.nectarlounge.com&quot;&gt;www.nectarlounge.com&lt;/a&gt;&lt;/p&gt;&lt;p style=&quot;font-weight:400&quot;&gt;\u00a0&lt;/p&gt;&lt;div&gt;&lt;div&gt;&lt;div&gt;&lt;div&gt;&lt;div&gt;&lt;div&gt;&lt;div&gt;&lt;p&gt;&lt;strong&gt;Tyler C.S. McGinnis&lt;/strong&gt; writes songs about the moments that shape us \u2014 the risks we take, the memories we carry, and the roads we didn\u2019t expect to travel. Blending Americana, folk, and alternative country influences, his music pairs vivid storytelling with a powerful, soulful voice that feels equally at home in an intimate room or on a full stage.&lt;/p&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;div&gt;\u00a0&lt;/div&gt;","image":"https://static.tixr.com/static/images/external/img/405e7804-20e3-4dae-8fe7-57c0752e1ac1.jpeg","url":"https://www.tixr.com/groups/nectarlounge/events/tyler-mcginnis-with-izzy-burns-ray-baron-the-orphan-40-193287","startDate":"2026-07-30T02:00:00+00:00","endDate":"2026-07-30T09:00:00+00:00","location":{"@type":"Place","name":"Nectar Lounge","address":{"@type":"PostalAddress","streetAddress":"","addressLocality":"Seattle","addressRegion":"WA","addressCountry":"US"}},"offers":{"@type":"Offer","url":"https://www.tixr.com/groups/nectarlounge/events/tyler-mcginnis-with-izzy-burns-ray-baron-the-orphan-40-193287","category":"primary","availability":"InStock","priceCurrency":"USD","price":14,"validFrom":"2026-06-03T00:00:00+00:00","validThrough":"2026-07-29T07:00:00+00:00"},"performer":"Organization"},{"@context":"http://schema.org","@type":"Event","name":"ANDERS OSBORNE &amp; JACKIE GREENE with Jay Cobb (of Fruition)","description":"&lt;p style=&quot;font-weight:400&quot;&gt;7.29 Wednesday (Americana / Blues)&lt;br /&gt;Hidden Hall &amp; The PBJ Present:&lt;br /&gt;&lt;strong&gt;ANDERS OSBORNE &amp; JACKIE GREENE&lt;/strong&gt;&lt;br /&gt;with Jay Cobb (of Fruition)&lt;br /&gt;7pm doors &lt;br /&gt;8pm show&lt;br /&gt;21&#043;&lt;br /&gt;&lt;br /&gt;&lt;/p&gt;&lt;p&gt;Hidden Hall&lt;br /&gt;400 N 35th St&lt;br /&gt;&lt;a href=&quot;http://hiddenhall.com&quot;&gt;hiddenhall.com&lt;/a&gt;&lt;/p&gt;&lt;p&gt;On his 17th full-length album, singer-songwriter &lt;strong&gt;Anders Osborne&lt;/strong&gt; describes Picasso\u2019s Villa, \u201ca condensed story about living in America between 2018-2021, the fears, confusion, deep joy and peace achieved through true friendship, family, community, hours of meditation and detachment from ego.&lt;/p&gt;&lt;p&gt;Osborne\u2019s six-string virtuosity, inventive musicality, and poetic song-craft underpin an ever-expanding three-decade catalog celebrated by fans and critics alike. As a sought-after studio talent, his writing resounds through Keb Mo\u2019s GRAMMY\u00ae Award-winning Slow Down, Tim McGraw\u2019s number one \u201cWatch The Wind Blow By,\u201d and covers by Brad Paisley, Jonny Lang, Edwin McCain, Aaron Neville, and more. His output live and in the studio spans working with everyone from Eric Church, Toots and the Maytals, and John Scofield to The Meters, North Mississippi Allstars, and Galactic. His extensive touring history encompasses gigs, collaborations, and performances alongside everyone from Derek Trucks, Warren Haynes, and Stanton Moore to The Grateful Dead\u2019s Phil Lesh and Jackie Greene. Not to mention, he lights up the screen on an episode of the HBO hit Treme. Plus, he has garnered acclaim from USA Today, Guitar Player, Relix, Offbeat, and more.&lt;/p&gt;&lt;p&gt;Americana and roots singer-songwriter &lt;strong&gt;Jackie Greene&lt;/strong&gt; is a jack-of-all-trades, and an artist who can croon over soulful piano ballads as much as he can shred a bluesy guitar solo (like he did as the lead guitarist for The Black Crowes in 2013). A road warrior and musician\\'s musician, Greene\\'s new EP \\'The Modern Lives - Vol 2\\' (out October 2018 on Blue Rose Music) finds him at a new chapter in his lif
