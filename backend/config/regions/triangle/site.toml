# Triangle region site manifest (region-pack epic, issue #62/#64).
#
# Branding/identity for the Triangle deployment: FastAPI title, iCal
# PRODID/CALNAME/CALDESC/timezone/UID host, city grouping, and the frontend
# presentation data served by GET /api/v1/site (palettes, links, subdomains).
# Loaded by app.site_config.load_site_config(); nothing else should read this
# file directly. Values here were transcribed verbatim from the former
# frontend literals (index.html, js/config.js, js/app.js) so Phase 2 reproduces
# today's exact bytes — see backend/tests/test_site_config.py and the
# characterization pins in test_feeds.py / test_openapi.py.

[site]
name          = "Triangle Shows"
domain        = "triangle-shows.net"
uid_host      = "triangle-shows.org"  # historical iCal UID host; distinct from domain (decision 8)
title         = "triangle-shows"
tagline       = "live music across the triangle on one calendar"
description   = "Live music events across Raleigh, Durham, Chapel Hill, Carrboro, and Cary"
calendar_description = "Live music across the Triangle — triangle-shows.net"  # iCal X-WR-CALDESC (api/feeds.py)
timezone      = "America/New_York"
region_code   = "NC"
favicon_color = "#f0922e"
default_palette = "amber"
ascii_art = """   __       _                   __               __                                    __
  / /______(_)___ _____  ____ _/ /__       _____/ /_  ____ _      _______  ____  ___  / /_
 / __/ ___/ / __ `/ __ \\/ __ `/ / _ \\_____/ ___/ __ \\/ __ \\ | /| / / ___/ / __ \\/ _ \\/ __/
/ /_/ /  / / /_/ / / / / /_/ / /  __/_____\\__ / / / / /_/ / |/ |/ /\\__ / / / / /  __/ /_
\\__/_/  /_/\\__,_/_/ /_/\\__, /_/\\___/    /____/_/ /_/\\____/|__/|__/____(_)_/ /_/\\___/\\__/
                      /____/                                                                """

