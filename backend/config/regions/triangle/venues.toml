# Triangle region venue pack.
#
# All 22 Triangle-area venues, translated verbatim from the former app/seed.py
# Python literal (region-pack epic, issue #62/#63). Loaded by
# app.site_config.load_venue_config(); app.seed derives its VENUES/REMOVED_SLUGS
# from this file so seeding stays a pure DB-upsert operation over declarative data.
#
# removed_slugs lists discontinued venues to delete on next seed (cascades to their
# events). Triangle currently removes nothing; the mechanism is exercised by the
# region-pack test fixtures instead.
#
# scraper_type selects the scraper class via app.scrapers.identity.SCRAPER_REGISTRY;
# scraper_config passes venue-specific options (URL, filters, account IDs) to that
# scraper. color is the hex used by the frontend to distinguish venues on the
# calendar.
#
# Scraper -> venue mapping (as of 2026-06-29 — update when venues are added/changed):
#   ticketmaster      Koka Booth Amphitheatre, Red Hat Amphitheater, DPAC, The Ritz
#   rhp_events        Lincoln Theatre, Cat's Cradle, Cat's Cradle Back Room, Local 506, The Pinhook
#   motorco           Motorco Music Hall
#   carolina_theatre  Carolina Theatre
#   eventprime        Kings
#   tribe_events      The Cave
#   venuepilot        Haw River Ballroom, Rubies on Five Points, Stanczyks
#   squarespace       Neptune's Parlour, Boom Club
#   mec               Shadowbox Studio, Slim's
#   tickpick_organizer Chapel of Bones
#   webflow_cms       Pour House

removed_slugs = []

