<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Triangle Shows — Broadsheet Stark</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.css" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #111111;
      --surface:   #1a1a1a;
      --border:    #2e2e2e;
      --accent:    #ffffff;
      --text:      #ffffff;
      --text-muted:#777777;
      --text-dim:  #444444;
      --font:      'Space Mono', monospace;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      font-size: 13px;
      line-height: 1.5;
    }

    /* ── HEADER ───────────────────────────────────────── */
    #header {
      background: #000;
      padding: 0 28px;
    }

    .header-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 0 10px;
    }

    .header-title {
      font-family: var(--font);
      font-size: clamp(18px, 2.4vw, 28px);
      font-weight: 700;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: #fff;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 20px;
    }

    .header-mockup-label {
      font-size: 9px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--text-muted);
      border: 1px solid var(--text-dim);
      padding: 3px 8px;
    }

    .header-tagline {
      font-size: 9px;
      color: var(--text-muted);
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }

    .header-rule {
      height: 1px;
      background: #fff;
      margin: 0;
    }

    /* ── LAYOUT ───────────────────────────────────────── */
    #layout {
      display: flex;
      height: calc(100vh - 60px);
      min-height: 0;
    }

    /* ── SIDEBAR ──────────────────────────────────────── */
    #sidebar {
      width: 240px;
      min-width: 200px;
      flex-shrink: 0;
      background: var(--surface);
      border-right: 1px solid var(--border);
      overflow-y: auto;
      padding: 20px 0 32px;
      display: flex;
      flex-direction: column;
    }

    #sidebar::-webkit-scrollbar { width: 3px; }
    #sidebar::-webkit-scrollbar-track { background: transparent; }
    #sidebar::-webkit-scrollbar-thumb { background: var(--border); }

    .sidebar-section {
      padding: 0 18px 22px;
    }

    .sidebar-label {
      font-family: var(--font);
      font-size: 9px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.28em;
      color: var(--text);
      padding-bottom: 8px;
      border-bottom: 1px dashed #fff;
      margin-bottom: 14px;
    }

    /* ── VENUE FILTER CHIPS ───────────────────────────── */
    .venue-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .venue-chip {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      padding: 5px 8px;
      border: 1px solid var(--border);
      background: transparent;
      transition: background 0.12s, border-color 0.12s;
      user-select: none;
    }

    .venue-chip:hover {
      border-color: var(--text-muted);
      background: rgba(255,255,255,0.04);
    }

    .venue-chip.active {
      background: #fff;
      border-color: #fff;
    }

    .venue-chip.active .venue-name-text {
      color: #000;
    }

    .venue-chip.active .venue-swatch {
      outline: 2px solid #000;
      outline-offset: 1px;
    }

    .venue-swatch {
      width: 10px;
      height: 10px;
      flex-shrink: 0;
      /* square — no border-radius */
    }

    .venue-name-text {
      font-size: 10px;
      letter-spacing: 0.06em;
      color: var(--text);
      flex: 1;
      transition: color 0.12s;
    }

    .venue-chip-x {
      font-size: 9px;
      color: var(--text-muted);
      opacity: 0;
      transition: opacity 0.12s;
      line-height: 1;
    }

    .venue-chip.active .venue-chip-x {
      opacity: 1;
      color: #555;
    }

    /* ── UPCOMING LIST ────────────────────────────────── */
    .upcoming-list {
      list-style: none;
      display: flex;
      flex-direction: column;
    }

    .upcoming-item {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 7px 0;
      border-bottom: 1px solid var(--border);
    }

    .upcoming-item:last-child { border-bottom: none; }

    .upcoming-date {
      font-size: 9px;
      color: var(--text-muted);
      letter-spacing: 0.08em;
      flex-shrink: 0;
      min-width: 48px;
      padding-top: 2px;
      text-transform: uppercase;
    }

    .upcoming-info { flex: 1; }

    .upcoming-title {
      font-size: 10px;
      font-weight: 700;
      color: var(--text);
      letter-spacing: 0.04em;
      line-height: 1.3;
    }

    .upcoming-venue {
      font-size: 9px;
      color: var(--text-muted);
      letter-spacing: 0.04em;
      margin-top: 1px;
    }

    .upcoming-bar {
      width: 2px;
      flex-shrink: 0;
      align-self: stretch;
      min-height: 28px;
    }

    /* ── BLOGROLL ─────────────────────────────────────── */
    .blogroll-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 7px;
    }

    .blogroll-list a {
      font-size: 10px;
      color: var(--text-muted);
      text-decoration: none;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: color 0.12s;
    }

    .blogroll-list a::before {
      content: '';
      display: inline-block;
      width: 10px;
      height: 1px;
      background: var(--text-dim);
      flex-shrink: 0;
      transition: background 0.12s, width 0.12s;
    }

    .blogroll-list a:hover {
      color: #fff;
    }

    .blogroll-list a:hover::before {
      background: #fff;
      width: 14px;
    }

    /* ── KO-FI ────────────────────────────────────────── */
    .kofi-section {
      padding: 0 18px;
      margin-top: auto;
    }

    .kofi-inner {
      border: 1px dashed #fff;
      padding: 12px 14px;
    }

    .kofi-pitch {
      font-size: 9px;
      color: var(--text-muted);
      letter-spacing: 0.14em;
      text-transform: uppercase;
      margin-bottom: 10px;
      line-height: 1.6;
    }

    .kofi-btn {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      background: transparent;
      color: #fff;
      border: 1px solid #fff;
      font-family: var(--font);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      padding: 7px 14px;
      cursor: pointer;
      transition: background 0.14s, color 0.14s;
    }

    .kofi-btn:hover {
      background: #fff;
      color: #000;
    }

    /* ── SIDEBAR DIVIDER ──────────────────────────────── */
    .sidebar-divider {
      height: 1px;
      background: var(--border);
      margin: 0 18px 22px;
    }

    /* ── MAIN CALENDAR AREA ───────────────────────────── */
    #main {
      flex: 1;
      min-width: 0;
      overflow: hidden;
      padding: 18px 22px 18px;
      display: flex;
      flex-direction: column;
    }

    #calendar-wrap {
      flex: 1;
      min-height: 0;
      overflow: hidden;
    }

    /* ── FULLCALENDAR WHITE/STARK OVERRIDES ──────────── */
    .fc {
      height: 100%;
      font-family: var(--font) !important;
      font-size: 12px;
    }

    /* Toolbar */
    .fc .fc-toolbar {
      margin-bottom: 12px;
      gap: 8px;
      flex-wrap: wrap;
    }

    .fc .fc-toolbar-title {
      font-family: var(--font) !important;
      font-size: 20px !important;
      font-weight: 700 !important;
      letter-spacing: 0.14em !important;
      text-transform: uppercase !important;
      color: #fff !important;
    }

    .fc .fc-button {
      background: transparent !important;
      border: 1px solid #444 !important;
      color: #aaa !important;
      font-family: var(--font) !important;
      font-size: 9px !important;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      padding: 5px 10px !important;
      border-radius: 0 !important;
      box-shadow: none !important;
      transition: background 0.12s, color 0.12s, border-color 0.12s !important;
    }

    .fc .fc-button:hover {
      background: rgba(255,255,255,0.08) !important;
      border-color: #aaa !important;
      color: #fff !important;
    }

    .fc .fc-button-active,
    .fc .fc-button:focus {
      background: #fff !important;
      border-color: #fff !important;
      color: #000 !important;
      outline: none !important;
    }

    .fc .fc-button-primary:not(:disabled):active,
    .fc .fc-button-primary:not(:disabled).fc-button-active {
      background: #fff !important;
      border-color: #fff !important;
      color: #000 !important;
    }

    /* Header row */
    .fc .fc-col-header {
      background: var(--bg);
    }

    .fc .fc-col-header-cell {
      border-color: var(--border) !important;
      padding: 6px 0 !important;
    }

    .fc .fc-col-header-cell-cushion {
      font-size: 8px !important;
      letter-spacing: 0.24em;
      text-transform: uppercase;
      color: var(--text-muted) !important;
      font-weight: 400 !important;
      text-decoration: none !important;
    }

    /* Grid borders */
    .fc-theme-standard td,
    .fc-theme-standard th {
      border-color: var(--border) !important;
    }

    .fc .fc-daygrid-body {
      background: var(--bg);
    }

    .fc .fc-daygrid-day {
      background: var(--bg) !important;
    }

    .fc .fc-daygrid-day:hover {
      background: rgba(255,255,255,0.015) !important;
    }

    /* Today highlight: white tint */
    .fc .fc-day-today {
      background: rgba(255,255,255,0.04) !important;
    }

    .fc .fc-day-today .fc-daygrid-day-number {
      color: #fff !important;
      font-weight: 700;
      background: #fff;
      color: #000 !important;
      padding: 2px 5px !important;
    }

    .fc .fc-daygrid-day-number {
      font-size: 10px !important;
      color: var(--text-muted) !important;
      text-decoration: none !important;
      padding: 4px 6px !important;
      font-weight: 400;
    }

    .fc .fc-daygrid-day-top { justify-content: flex-end; }

    /* Events — venue colors pop against dark */
    .fc .fc-daygrid-event {
      border: none !important;
      border-radius: 0 !important;
      font-size: 10px !important;
      font-family: var(--font) !important;
      padding: 1px 4px !important;
      margin: 1px 2px !important;
      font-weight: 700;
      letter-spacing: 0.03em;
      cursor: pointer;
      opacity: 0.9;
      transition: opacity 0.12s, filter 0.12s;
    }

    .fc .fc-daygrid-event:hover {
      opacity: 1;
      filter: brightness(1.2);
      z-index: 5;
    }

    .fc .fc-event-title {
      font-weight: 700 !important;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .fc .fc-more-link {
      font-size: 8px !important;
      color: var(--text-muted) !important;
      font-family: var(--font) !important;
      letter-spacing: 0.1em;
      text-decoration: none;
    }

    .fc .fc-more-link:hover { color: #fff !important; }

    /* Popover */
    .fc .fc-popover {
      background: #000 !important;
      border: 1px solid #fff !important;
      border-radius: 0 !important;
      box-shadow: 0 4px 24px rgba(0,0,0,0.8) !important;
    }

    .fc .fc-popover-header {
      background: #000 !important;
      border-bottom: 1px solid var(--border) !important;
      font-size: 9px !important;
      font-family: var(--font) !important;
      color: var(--text-muted) !important;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      padding: 6px 10px !important;
    }

    .fc .fc-popover-close {
      color: var(--text-muted) !important;
    }

    /* Other-month days */
    .fc .fc-day-other .fc-daygrid-day-number {
      color: var(--text-dim) !important;
    }

    .fc .fc-day-other {
      background: rgba(0,0,0,0.5) !important;
    }

    /* Scrollbar */
    .fc-scroller::-webkit-scrollbar { width: 3px; height: 3px; }
    .fc-scroller::-webkit-scrollbar-track { background: transparent; }
    .fc-scroller::-webkit-scrollbar-thumb { background: var(--border); }
  </style>
</head>
<body>

<!-- HEADER -->
<header id="header">
  <div class="header-bar">
    <div class="header-title">Triangle Shows</div>
    <div class="header-right">
      <span class="header-tagline">Raleigh &bull; Durham &bull; Chapel Hill</span>
      <span class="header-mockup-label">Mockup 1-B &mdash; Broadsheet Stark</span>
    </div>
  </div>
  <div class="header-rule"></div>
</header>

<!-- LAYOUT -->
<div id="layout">

  <!-- SIDEBAR -->
  <aside id="sidebar">

    <!-- VENUE FILTER -->
    <div class="sidebar-section">
      <div class="sidebar-label">Venues</div>
      <ul class="venue-list" id="venueList"></ul>
    </div>

    <div class="sidebar-divider"></div>

    <!-- UPCOMING -->
    <div class="sidebar-section">
      <div class="sidebar-label">Upcoming</div>
      <ul class="upcoming-list" id="upcomingList"></ul>
    </div>

    <div class="sidebar-divider"></div>

    <!-- BLOGROLL -->
    <div class="sidebar-section">
      <div class="sidebar-label">Friends &amp; Feeds</div>
      <ul class="blogroll-list">
        <li><a href="#">Fuzzy Needle IG</a></li>
        <li><a href="#">Perfect Lovers Cafe IG</a></li>
        <li><a href="#">Weirs IG</a></li>
        <li><a href="#">Sluice IG</a></li>
        <li><a href="#">Field Guide Newsletter</a></li>
      </ul>
    </div>

    <div class="sidebar-divider"></div>

    <!-- KO-FI -->
    <div class="kofi-section">
      <div class="kofi-inner">
        <div class="kofi-pitch">Keeps the scraper alive:</div>
        <button class="kofi-btn">&#9749; Buy a Coffee</button>
      </div>
    </div>

  </aside>

  <!-- MAIN -->
  <main id="main">
    <div id="calendar-wrap">
      <div id="calendar"></div>
    </div>
  </main>

</div><!-- /layout -->

<script>
  const VENUES = [
    { name: "Red Hat Amphitheater",  color: "#e85d04" },
    { name: "DPAC",                  color: "#7209b7" },
    { name: "Cat's Cradle",          color: "#2d6a4f" },
    { name: "The Ritz",              color: "#e63946" },
    { name: "Motorco Music Hall",    color: "#457b9d" },
    { name: "Haw River Ballroom",    color: "#d946ef" },
    { name: "Local 506",             color: "#f4a261" },
    { name: "Lincoln Theatre",       color: "#06b6d4" },
  ];

  const EVENTS = [
    { title:"Hozier",              date:"2026-02-27", venue:"Red Hat Amphitheater" },
    { title:"boygenius",           date:"2026-02-28", venue:"DPAC" },
    { title:"Wednesday",           date:"2026-03-01", venue:"Cat's Cradle" },
    { title:"Waxahatchee",         date:"2026-03-01", venue:"Motorco Music Hall" },
    { title:"Indigo De Souza",     date:"2026-03-03", venue:"The Ritz" },
    { title:"Angel Olsen",         date:"2026-03-05", venue:"Lincoln Theatre" },
    { title:"Turnpike Troubadours",date:"2026-03-06", venue:"Red Hat Amphitheater" },
    { title:"Mdou Moctar",         date:"2026-03-07", venue:"Cat's Cradle" },
    { title:"King Gizzard",        date:"2026-03-08", venue:"The Ritz" },
    { title:"Yaya Bey",            date:"2026-03-10", venue:"Local 506" },
    { title:"Trampled by Turtles", date:"2026-03-11", venue:"DPAC" },
    { title:"Deerhoof",            date:"2026-03-12", venue:"Motorco Music Hall" },
    { title:"Caroline Polachek",   date:"2026-03-13", venue:"Red Hat Amphitheater" },
    { title:"MUNA",                date:"2026-03-15", venue:"Lincoln Theatre" },
    { title:"Samia",               date:"2026-03-15", venue:"Local 506" },
    { title:"Built to Spill",      date:"2026-03-17", venue:"Cat's Cradle" },
    { title:"Jeff Tweedy",         date:"2026-03-20", venue:"DPAC" },
    { title:"Weyes Blood",         date:"2026-03-21", venue:"Lincoln Theatre" },
    { title:"Soccer Mommy",        date:"2026-03-25", venue:"The Ritz" },
    { title:"Adrianne Lenker",     date:"2026-03-26", venue:"Haw River Ballroom" },
    { title:"Gillian Welch",       date:"2026-03-29", venue:"Red Hat Amphitheater" },
  ];

  // ── State ───────────────────────────────────────────
  const venueMap = {};
  VENUES.forEach(v => { venueMap[v.name] = v; });

  let activeVenues = new Set(VENUES.map(v => v.name));
  let calendarInstance = null;

  // ── Build venue chip list ───────────────────────────
  function buildVenueList() {
    const ul = document.getElementById('venueList');
    VENUES.forEach(v => {
      const li = document.createElement('li');
      li.className = 'venue-chip active';
      li.dataset.venue = v.name;
      li.innerHTML = `
        <span class="venue-swatch" style="background:${v.color}"></span>
        <span class="venue-name-text">${v.name}</span>
        <span class="venue-chip-x">&#10005;</span>
      `;
      li.addEventListener('click', () => toggleVenue(v.name, li));
      ul.appendChild(li);
    });
  }

  function toggleVenue(name, el) {
    if (activeVenues.has(name)) {
      activeVenues.delete(name);
      el.classList.remove('active');
    } else {
      activeVenues.add(name);
      el.classList.add('active');
    }
    refreshCalendar();
  }

  // ── Build upcoming list ─────────────────────────────
  function buildUpcoming() {
    const ul = document.getElementById('upcomingList');
    const today = new Date('2026-02-26');
    const sorted = [...EVENTS]
      .filter(e => new Date(e.date) >= today)
      .sort((a,b) => a.date.localeCompare(b.date))
      .slice(0, 8);

    sorted.forEach(e => {
      const v = venueMap[e.venue];
      const d = new Date(e.date + 'T00:00:00');
      const label = d.toLocaleDateString('en-US', { month:'short', day:'numeric' });
      const li = document.createElement('li');
      li.className = 'upcoming-item';
      li.innerHTML = `
        <div class="upcoming-bar" style="background:${v ? v.color : '#555'}"></div>
        <div class="upcoming-info">
          <div class="upcoming-title">${e.title}</div>
          <div class="upcoming-venue">${e.venue}</div>
        </div>
        <div class="upcoming-date">${label}</div>
      `;
      ul.appendChild(li);
    });
  }

  // ── Filtered FC events ──────────────────────────────
  function getFilteredEvents() {
    return EVENTS
      .filter(e => activeVenues.has(e.venue))
      .map(e => {
        const v = venueMap[e.venue];
        return {
          title: e.title,
          start: e.date,
          allDay: true,
          backgroundColor: v ? v.color : '#555',
          borderColor: v ? v.color : '#555',
          extendedProps: { venue: e.venue }
        };
      });
  }

  function refreshCalendar() {
    if (!calendarInstance) return;
    const sources = calendarInstance.getEventSources();
    sources.forEach(s => s.remove());
    calendarInstance.addEventSource(getFilteredEvents());
  }

  // ── Init calendar ───────────────────────────────────
  document.addEventListener('DOMContentLoaded', () => {
    buildVenueList();
    buildUpcoming();

    const el = document.getElementById('calendar');
    calendarInstance = new FullCalendar.Calendar(el, {
      initialView: 'dayGridMonth',
      initialDate: '2026-02-26',
      fixedWeekCount: false,
      headerToolbar: {
        left:   'prev,next today',
        center: 'title',
        right:  'dayGridMonth,dayGridWeek'
      },
      events: getFilteredEvents(),
      eventDidMount(info) {
        info.el.title = `${info.event.title} @ ${info.event.extendedProps.venue}`;
      }
    });

    calendarInstance.render();

    window.addEventListener('resize', () => calendarInstance.updateSize());
  });
</script>
</body>
</html>
