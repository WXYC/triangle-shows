<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Triangle Shows — Modern Coral</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.css" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:           #fafaf8;
      --surface:      #ffffff;
      --border:       #e8e4df;
      --border-light: #f0ede9;
      --text:         #1c1917;
      --muted:        #78716c;
      --accent:       #ea580c;
      --accent-bg:    #fff7ed;
      --accent-hover: #c2410c;
      --radius-sm:    4px;
      --radius-md:    8px;
      --radius-lg:    14px;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      line-height: 1.5;
    }

    /* ─── APP SHELL ─── */
    .app {
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    /* ─── HEADER ─── */
    .header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      box-shadow: 0 1px 6px rgba(28,25,23,0.07);
      padding: 0 20px;
      height: 56px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
      z-index: 10;
    }

    .logo {
      width: 34px;
      height: 34px;
      border-radius: 7px;
      background: linear-gradient(135deg, #ea580c 0%, #f97316 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 15px;
      font-weight: 800;
      color: #fff;
      flex-shrink: 0;
      letter-spacing: -0.5px;
      box-shadow: 0 2px 8px rgba(234,88,12,0.3);
    }

    .header-titles {
      display: flex;
      flex-direction: column;
      gap: 1px;
      flex: 1;
    }

    .header-titles .site-name {
      font-size: 1.05rem;
      font-weight: 800;
      color: var(--text);
      letter-spacing: -0.3px;
      line-height: 1.1;
    }

    .header-titles .site-sub {
      font-size: 11px;
      color: var(--muted);
      font-weight: 400;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .event-pill {
      background: var(--accent-bg);
      color: var(--accent);
      border: 1px solid rgba(234,88,12,0.22);
      border-radius: 20px;
      padding: 3px 11px;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.2px;
    }

    .mockup-label {
      font-size: 10.5px;
      color: var(--muted);
      font-weight: 500;
      opacity: 0.7;
      font-style: italic;
    }

    /* ─── BODY SPLIT ─── */
    .body {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ─── SIDEBAR ─── */
    .sidebar {
      width: 240px;
      flex-shrink: 0;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow-y: auto;
      padding: 16px 14px;
      gap: 20px;
    }

    .sidebar::-webkit-scrollbar { width: 4px; }
    .sidebar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    /* Search */
    .search-wrap { position: relative; }
    .search-wrap input {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      color: var(--text);
      padding: 8px 10px 8px 32px;
      font-family: inherit;
      font-size: 13px;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .search-wrap input::placeholder { color: var(--muted); }
    .search-wrap input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(234,88,12,0.1);
    }
    .search-icon {
      position: absolute;
      left: 9px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      font-size: 13px;
      pointer-events: none;
    }

    /* Section labels */
    .section-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 8px;
    }

    /* Chips */
    .chip-group { display: flex; flex-wrap: wrap; gap: 6px; }
    .chip {
      padding: 4px 10px;
      border-radius: 20px;
      border: 1px solid var(--border);
      font-size: 11.5px;
      font-weight: 500;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.15s;
      background: transparent;
      font-family: inherit;
    }
    .chip:hover { border-color: var(--accent); color: var(--accent); }
    .chip.active {
      background: var(--accent-bg);
      border-color: rgba(234,88,12,0.35);
      color: var(--accent);
    }

    /* Venue list */
    .venue-list { display: flex; flex-direction: column; gap: 5px; }
    .venue-item {
      display: flex;
      align-items: center;
      gap: 9px;
      padding: 5px 6px;
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: background 0.12s;
    }
    .venue-item:hover { background: var(--bg); }
    .venue-swatch {
      width: 12px;
      height: 12px;
      border-radius: 3px;
      flex-shrink: 0;
    }
    .venue-name {
      font-size: 12.5px;
      color: var(--text);
      font-weight: 400;
    }

    /* Blogroll */
    .blogroll-list { display: flex; flex-direction: column; gap: 5px; }
    .blogroll-link {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12.5px;
      color: var(--muted);
      text-decoration: none;
      padding: 3px 2px;
      border-radius: var(--radius-sm);
      transition: color 0.15s;
    }
    .blogroll-link .arrow { font-style: normal; opacity: 0.55; transition: opacity 0.15s; }
    .blogroll-link:hover { color: var(--accent); }
    .blogroll-link:hover .arrow { opacity: 1; }

    /* Ko-fi */
    .kofi-section {
      background: var(--accent-bg);
      border: 1px solid rgba(234,88,12,0.18);
      border-radius: var(--radius-md);
      padding: 12px 12px 14px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .kofi-pitch {
      font-size: 12px;
      color: var(--muted);
      font-style: italic;
      line-height: 1.5;
    }
    .kofi-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 7px 14px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: var(--radius-sm);
      font-family: inherit;
      font-size: 12.5px;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.15s, transform 0.1s, box-shadow 0.15s;
      box-shadow: 0 2px 6px rgba(234,88,12,0.25);
    }
    .kofi-btn:hover {
      background: var(--accent-hover);
      transform: translateY(-1px);
      box-shadow: 0 4px 10px rgba(234,88,12,0.3);
    }
    .kofi-btn:active { transform: translateY(0); }

    /* ─── CALENDAR PANE ─── */
    .calendar-pane {
      flex: 1;
      overflow: auto;
      padding: 18px 20px;
      background: var(--bg);
    }

    .calendar-pane::-webkit-scrollbar { width: 6px; height: 6px; }
    .calendar-pane::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    #calendar { height: 100%; min-height: 600px; }

    /* ─── FULLCALENDAR WARM OVERRIDES ─── */
    .fc {
      --fc-border-color: var(--border);
      --fc-button-bg-color: var(--surface);
      --fc-button-border-color: var(--border);
      --fc-button-hover-bg-color: var(--accent-bg);
      --fc-button-hover-border-color: var(--accent);
      --fc-button-active-bg-color: var(--accent-bg);
      --fc-button-active-border-color: var(--accent);
      --fc-today-bg-color: #fff7ed;
      --fc-page-bg-color: var(--bg);
      --fc-neutral-bg-color: var(--surface);
      font-family: 'Inter', sans-serif;
    }

    /* Toolbar */
    .fc .fc-toolbar.fc-header-toolbar {
      margin-bottom: 14px;
    }

    .fc .fc-toolbar-title {
      font-size: 1.15rem;
      font-weight: 800;
      color: var(--text);
      letter-spacing: -0.3px;
    }

    .fc .fc-button {
      background: var(--surface) !important;
      border: 1px solid var(--border) !important;
      color: var(--muted) !important;
      font-family: 'Inter', sans-serif !important;
      font-size: 12px !important;
      font-weight: 600 !important;
      padding: 5px 11px !important;
      border-radius: var(--radius-sm) !important;
      box-shadow: none !important;
      text-transform: capitalize !important;
      transition: all 0.15s !important;
    }

    .fc .fc-button:hover {
      background: var(--accent-bg) !important;
      border-color: rgba(234,88,12,0.4) !important;
      color: var(--accent) !important;
    }

    .fc .fc-button-primary:not(:disabled).fc-button-active,
    .fc .fc-button-primary:not(:disabled):active {
      background: var(--accent-bg) !important;
      border-color: rgba(234,88,12,0.4) !important;
      color: var(--accent) !important;
    }

    .fc .fc-button-group .fc-button { border-radius: 0 !important; }
    .fc .fc-button-group .fc-button:first-child { border-radius: var(--radius-sm) 0 0 var(--radius-sm) !important; }
    .fc .fc-button-group .fc-button:last-child { border-radius: 0 var(--radius-sm) var(--radius-sm) 0 !important; }

    /* Column headers */
    .fc .fc-col-header-cell-cushion {
      font-size: 10.5px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--muted);
      text-decoration: none;
      padding: 8px 4px;
    }

    .fc .fc-col-header-cell {
      background: #faf9f7;
      border-color: var(--border) !important;
    }

    /* Day cells */
    .fc .fc-daygrid-day {
      background: var(--surface);
      transition: background 0.12s;
    }

    .fc .fc-daygrid-day:hover { background: #fdf9f6; }

    .fc .fc-daygrid-day.fc-day-today {
      background: #fff7ed !important;
    }

    .fc .fc-daygrid-day-number {
      font-size: 12px;
      font-weight: 600;
      color: var(--muted);
      text-decoration: none;
      padding: 6px 8px;
    }

    .fc .fc-day-today .fc-daygrid-day-number {
      color: var(--accent);
      background: rgba(234,88,12,0.12);
      border-radius: 50%;
      width: 24px;
      height: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      margin: 5px 6px;
    }

    /* Other month days */
    .fc .fc-day-other .fc-daygrid-day-number { color: #d6d3d1; }
    .fc .fc-day-other { background: #fafaf8 !important; }

    /* Grid lines */
    .fc td, .fc th { border-color: var(--border) !important; }

    /* Event tiles */
    .fc .fc-daygrid-event {
      border-radius: 5px !important;
      border: none !important;
      margin: 1px 3px !important;
      padding: 0 !important;
    }

    .fc-event-custom {
      padding: 3px 6px 4px;
      border-radius: 5px;
      line-height: 1.25;
    }

    .fc-event-custom .ev-title {
      font-size: 11.5px;
      font-weight: 700;
      color: #fff;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .fc-event-custom .ev-venue {
      font-size: 9.5px;
      font-weight: 400;
      color: rgba(255,255,255,0.80);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .fc .fc-daygrid-event-harness { margin-top: 2px !important; }

    /* More link */
    .fc .fc-daygrid-more-link {
      color: var(--accent) !important;
      font-size: 11px !important;
      font-weight: 600 !important;
    }

    /* Popover */
    .fc .fc-popover {
      background: var(--surface) !important;
      border: 1px solid var(--border) !important;
      border-radius: var(--radius-md) !important;
      box-shadow: 0 8px 24px rgba(28,25,23,0.12) !important;
    }

    .fc .fc-popover-header {
      background: var(--bg) !important;
      color: var(--text) !important;
      border-radius: var(--radius-md) var(--radius-md) 0 0 !important;
      padding: 8px 12px !important;
      font-weight: 700 !important;
      font-size: 12px !important;
      border-bottom: 1px solid var(--border) !important;
    }

    .fc .fc-popover-close {
      color: var(--muted) !important;
      font-size: 14px !important;
    }

    /* Divider */
    .sidebar-divider {
      height: 1px;
      background: var(--border-light);
      margin: 0 -2px;
    }
  </style>
</head>
<body>
<div class="app">

  <!-- HEADER -->
  <header class="header">
    <div class="logo">T</div>
    <div class="header-titles">
      <span class="site-name">Triangle Shows</span>
      <span class="site-sub">Live music in the Triangle</span>
    </div>
    <div class="header-right">
      <span class="event-pill">631 events</span>
      <span class="mockup-label">Mockup 5b — Modern Coral</span>
    </div>
  </header>

  <div class="body">

    <!-- SIDEBAR -->
    <aside class="sidebar">

      <!-- Search -->
      <div>
        <div class="search-wrap">
          <span class="search-icon">&#128269;</span>
          <input type="text" placeholder="Search artists, venues…" />
        </div>
      </div>

      <div class="sidebar-divider"></div>

      <!-- City filter -->
      <div>
        <div class="section-label">City</div>
        <div class="chip-group">
          <button class="chip active">All</button>
          <button class="chip">Durham</button>
          <button class="chip">Raleigh</button>
          <button class="chip">Chapel Hill</button>
          <button class="chip">Pittsboro</button>
        </div>
      </div>

      <!-- Size filter -->
      <div>
        <div class="section-label">Venue Size</div>
        <div class="chip-group">
          <button class="chip active">All</button>
          <button class="chip">Intimate</button>
          <button class="chip">Mid-size</button>
          <button class="chip">Large</button>
        </div>
      </div>

      <!-- Genre filter -->
      <div>
        <div class="section-label">Genre</div>
        <div class="chip-group">
          <button class="chip active">All</button>
          <button class="chip">Folk</button>
          <button class="chip">Indie</button>
          <button class="chip">Rock</button>
          <button class="chip">Jazz</button>
          <button class="chip">Electronic</button>
        </div>
      </div>

      <div class="sidebar-divider"></div>

      <!-- Venues -->
      <div>
        <div class="section-label">Venues</div>
        <div class="venue-list" id="venue-list"></div>
      </div>

      <div class="sidebar-divider"></div>

      <!-- Blogroll -->
      <div>
        <div class="section-label">More to Explore</div>
        <div class="blogroll-list">
          <a href="#" class="blogroll-link"><span class="arrow">→</span> Fuzzy Needle</a>
          <a href="#" class="blogroll-link"><span class="arrow">→</span> Perfect Lovers Cafe</a>
          <a href="#" class="blogroll-link"><span class="arrow">→</span> Weirs</a>
          <a href="#" class="blogroll-link"><span class="arrow">→</span> Sluice</a>
          <a href="#" class="blogroll-link"><span class="arrow">→</span> Field Guide Newsletter</a>
        </div>
      </div>

      <div class="sidebar-divider"></div>

      <!-- Ko-fi -->
      <div class="kofi-section">
        <p class="kofi-pitch">Keeps the scraper alive:</p>
        <a href="#" class="kofi-btn">
          &#9749; Support on Ko-fi
        </a>
      </div>

    </aside>

    <!-- CALENDAR -->
    <main class="calendar-pane">
      <div id="calendar"></div>
    </main>

  </div>
</div>

<script>
  const VENUES = [
    { name: "Red Hat Amphitheater", color: "#e85d04" },
    { name: "DPAC",                 color: "#7209b7" },
    { name: "Cat's Cradle",         color: "#2d6a4f" },
    { name: "The Ritz",             color: "#e63946" },
    { name: "Motorco Music Hall",   color: "#457b9d" },
    { name: "Haw River Ballroom",   color: "#d946ef" },
    { name: "Local 506",            color: "#f4a261" },
    { name: "Lincoln Theatre",      color: "#06b6d4" },
  ];

  const EVENTS = [
    { title:"Hozier",                date:"2026-02-27", venue:"Red Hat Amphitheater" },
    { title:"boygenius",             date:"2026-02-28", venue:"DPAC" },
    { title:"Wednesday",             date:"2026-03-01", venue:"Cat's Cradle" },
    { title:"Waxahatchee",           date:"2026-03-01", venue:"Motorco Music Hall" },
    { title:"Indigo De Souza",       date:"2026-03-03", venue:"The Ritz" },
    { title:"Angel Olsen",           date:"2026-03-05", venue:"Lincoln Theatre" },
    { title:"Turnpike Troubadours",  date:"2026-03-06", venue:"Red Hat Amphitheater" },
    { title:"Mdou Moctar",           date:"2026-03-07", venue:"Cat's Cradle" },
    { title:"King Gizzard",          date:"2026-03-08", venue:"The Ritz" },
    { title:"Yaya Bey",              date:"2026-03-10", venue:"Local 506" },
    { title:"Trampled by Turtles",   date:"2026-03-11", venue:"DPAC" },
    { title:"Deerhoof",              date:"2026-03-12", venue:"Motorco Music Hall" },
    { title:"Caroline Polachek",     date:"2026-03-13", venue:"Red Hat Amphitheater" },
    { title:"MUNA",                  date:"2026-03-15", venue:"Lincoln Theatre" },
    { title:"Samia",                 date:"2026-03-15", venue:"Local 506" },
    { title:"Built to Spill",        date:"2026-03-17", venue:"Cat's Cradle" },
    { title:"Jeff Tweedy",           date:"2026-03-20", venue:"DPAC" },
    { title:"Weyes Blood",           date:"2026-03-21", venue:"Lincoln Theatre" },
    { title:"Soccer Mommy",          date:"2026-03-25", venue:"The Ritz" },
    { title:"Adrianne Lenker",       date:"2026-03-26", venue:"Haw River Ballroom" },
    { title:"Gillian Welch",         date:"2026-03-29", venue:"Red Hat Amphitheater" },
  ];

  // Build venue color lookup
  const venueColor = {};
  VENUES.forEach(v => { venueColor[v.name] = v.color; });

  // Populate sidebar venue list
  const venueListEl = document.getElementById('venue-list');
  VENUES.forEach(v => {
    const item = document.createElement('div');
    item.className = 'venue-item';
    item.innerHTML = `
      <span class="venue-swatch" style="background:${v.color}"></span>
      <span class="venue-name">${v.name}</span>
    `;
    venueListEl.appendChild(item);
  });

  // Map events to FullCalendar format
  const fcEvents = EVENTS.map(e => ({
    title: e.title,
    date: e.date,
    allDay: true,
    extendedProps: { venue: e.venue },
    backgroundColor: venueColor[e.venue] || '#ea580c',
    borderColor: 'transparent',
  }));

  // Chip interactivity
  document.querySelectorAll('.chip-group').forEach(group => {
    group.querySelectorAll('.chip').forEach(chip => {
      chip.addEventListener('click', () => {
        group.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
        chip.classList.add('active');
      });
    });
  });

  // Init FullCalendar
  document.addEventListener('DOMContentLoaded', () => {
    const calEl = document.getElementById('calendar');
    const calendar = new FullCalendar.Calendar(calEl, {
      initialView: 'dayGridMonth',
      initialDate: '2026-02-26',
      fixedWeekCount: false,
      headerToolbar: {
        left: 'prev,next today',
        center: 'title',
        right: 'dayGridMonth,dayGridWeek',
      },
      height: '100%',
      events: fcEvents,
      eventContent: function(arg) {
        const venue = arg.event.extendedProps.venue || '';
        const color = venueColor[venue] || '#ea580c';
        return {
          html: `<div class="fc-event-custom" style="background:${color}">
                   <div class="ev-title">${arg.event.title}</div>
                   <div class="ev-venue">${venue}</div>
                 </div>`
        };
      },
      dayMaxEvents: 3,
      moreLinkContent: function(args) {
        return `+${args.num} more`;
      },
    });
    calendar.render();
  });
</script>
</body>
</html>
