# Declarative Cloud Run service definition (Knative format).
#
# Use this for manual one-off deploys or to inspect/diff the full service config.
# For CI/CD, use cloudbuild.yaml instead (it calls `gcloud run deploy` directly).
#
# Before applying, substitute placeholders:
#   PROJECT_ID   — your GCP project ID (e.g. my-project-123)
#   IMAGE_URL    — full image path, e.g.:
#                  us-east1-docker.pkg.dev/my-project-123/triangle-shows/api:abc1234
#
# Apply with:
#   gcloud run services replace cloudrun-service.yaml --region=us-east1

apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: triangle-shows
  annotations:
    run.googleapis.com/ingress: all
spec:
  template:
    metadata:
      annotations:
        # Scale to zero when idle; cap at 2 instances
        autoscaling.knative.dev/minScale: "0"
        autoscaling.knative.dev/maxScale: "2"
    spec:
      # Increase timeout to accommodate scrape requests (default is 300s)
      timeoutSeconds: 300
      containers:
        - image: IMAGE_URL  # replace before applying
          ports:
            - name: http1
              containerPort: 8000
          resources:
            limits:
              memory: 512Mi
              cpu: 1000m
          env:
            - name: APP_ENV
              value: "production"
            - name: ENABLE_SCHEDULER
              value: "false"   # Cloud Scheduler triggers /api/scrape instead
            - name: LOG_LEVEL
              value: "INFO"
            # DATABASE_URL and TICKETMASTER_API_KEY pulled from Secret Manager
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: triangle-shows-db-url
                  key: latest
            - name: TICKETMASTER_API_KEY
              valueFrom:
                secretKeyRef:
                  name: triangle-shows-tm-api-key
                  key: latest
